apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-operator
  namespace: flux-giantswarm
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "0.4.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/flux-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-giantswarm
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 3
  interval: 10m
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: monitoring.coreos.com
              version: v1
              kind: ServiceMonitor
              name: flux-operator
              namespace: flux-giantswarm
            patch: |
              - op: add
                path: /spec/endpoints/0/metricRelabelings
                value:
                  - sourceLabels: [__name__]
                    regex: "flux_resource_info"
                    action: drop
  releaseName: flux-operator
  timeout: 5m
  upgrade:
    remediation:
      retries: 3
  values:
    flux-operator:
      installCRDs: false
      extraEnvs:
      - name: NOTIFICATIONS_DISABLED
        value: "1"

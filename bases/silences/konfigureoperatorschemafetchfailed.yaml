apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: konfigureoperatorschemafetchfailed
  namespace: monitoring
  annotations:
    motivation: "konfigure-operator konfigurationschema controller does not reconcile KonfigurationSchema CRs and emits no metrics. All Konfiguration renderings are healthy. Silenced while upstream bug is investigated with the honeybadger team."
    valid-until: "2026-06-30"
spec:
  matchers:
    - name: alertname
      value: "KonfigureOperatorSchemaFetchFailed"
      matchType: "="
    - name: cluster_id
      value: ".*"
      matchType: "=~"

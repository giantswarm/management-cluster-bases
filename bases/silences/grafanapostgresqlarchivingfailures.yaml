apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: grafanapostgresqlarchivingfailures
  namespace: monitoring
  annotations:
    motivation: Generates false alerts
    github_issue: https://github.com/giantswarm/giantswarm/issues/36554
    valid-until: 2100-01-01
spec:
  matchers:
    - name: alertname
      value: "GrafanaPostgresqlArchivingFailure"
      matchType: "="
    - name: cluster_id
      value: ".*"
      matchType: "=~"

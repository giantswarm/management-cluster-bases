---
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: crossplane-functions-kustomization-failed
  namespace: monitoring
  annotations:
    reason: "Temporary: the crossplane-functions Flux Kustomization fails with an unresolved placeholder path (management-cluster-bases#607) until the per-MC fix merges. Remove once the fix has rolled out."
    valid-until: "2026-07-27"
spec:
  matchers:
    - name: alertname
      value: FluxKustomizationFailed
      matchType: "="
    - name: name
      value: crossplane-functions
      matchType: "="
    - name: cluster_id
      value: ".*"
      matchType: "=~"

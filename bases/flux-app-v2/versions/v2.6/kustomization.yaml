apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: flux-app
    includeCRDs: false
    namespace: flux-giantswarm
    repo: oci://gsoci.azurecr.io/charts/giantswarm
    releaseName: flux-giantswarm
    version: 1.10.2
    apiVersions:
    - autoscaling.k8s.io/v1
    valuesInline:
      images:
        registry: gsoci.azurecr.io
      cilium:
        enforce: true
      podMonitors:
        enabled: true
      policyException:
        enforce: true
        namespace: flux-giantswarm
      clusterRoles:
        install: false
      crds:
        install: false
      verticalPodAutoscaler:
        enabled: true
        force: true
components:
  - ../../common

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Flux 2.6 -> 2.7 migration. Only three version-specific values live here; the
# rest of the Job comes from ../../template.
resources:
  - ../../template
# Run-once name: flux-app-flux-migrate -> flux-app-flux-migrate-2-7-5
nameSuffix: -2-7-5
# Target flux-cli version.
images:
  - name: gsoci.azurecr.io/giantswarm/flux-cli
    newTag: v2.7.5
# Version to migrate FROM.
patches:
  - target:
      kind: Job
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - migrate
          - --version=2.6

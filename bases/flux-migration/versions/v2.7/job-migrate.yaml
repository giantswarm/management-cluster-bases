# Flux 2.6 -> 2.7 storage-migration Job.
#
# Extracted from the flux-app chart's pre-upgrade hook (templates/migration/job.yaml)
# and delivered as a plain, GitOps-managed manifest. The ordering that a pre-upgrade
# hook would give is provided instead by the `flux-migration` Kustomization (wait: true),
# which `crds` dependsOn.
#
# The name is pinned to the target version so the Job runs exactly once per
# transition. There is deliberately no ttlSecondsAfterFinished: a completed Job
# must persist so the owning Kustomization stays Ready and GitOps does not
# recreate (and thus re-run) it. Cleanup happens when the migration is removed
# from the cluster's flux-migration directory (the Kustomization prunes it).
apiVersion: batch/v1
kind: Job
metadata:
  name: flux-app-flux-migrate-2-7-5
  namespace: flux-giantswarm
  labels:
    app.kubernetes.io/component: flux-migration
    app.kubernetes.io/name: flux-app
    app.kubernetes.io/part-of: flux
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app.kubernetes.io/component: flux-migration
        app.kubernetes.io/name: flux-app
        app.kubernetes.io/part-of: flux
    spec:
      serviceAccountName: kustomize-controller
      restartPolicy: Never
      securityContext:
        runAsUser: 1000
        runAsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: flux-cli
          image: gsoci.azurecr.io/giantswarm/flux-cli:v2.7.5
          args:
            - migrate
            - --version=2.6
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

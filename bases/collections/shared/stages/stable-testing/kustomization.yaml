patches:
  - target:
      kind: Konfiguration
      name: collection-konfiguration
      namespace: giantswarm
    patch: '[{"op": "add", "path": "/spec/targets/defaults/variables/-", "value": {"name": "stage", "value": "stable-testing"}}]'
  - target:
      kind: OCIRepository
      name: konfigure-operator
      namespace: giantswarm
    path: semver-konfigure-operator.yaml
  - target:
      kind: OCIRepository
      name: kyverno-policies-ux
      namespace: giantswarm
    path: semver-kyverno-policies-ux.yaml
resources:
  - ../../base

patches:
  - target:
      kind: Konfiguration
      name: collection-konfiguration
      namespace: giantswarm
    patch:
      '[{"op": "add", "path": "/spec/targets/defaults/variables/-", "value": {"name": "stage", "value": "testing"}}]'
  - target:
      kind: OCIRepository
      namespace: giantswarm
    path: ../../patches/semver-stable-or-rc.yaml
resources:
  - ../../base

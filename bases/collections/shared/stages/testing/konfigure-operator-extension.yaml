apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: konfigure-operator-podmonitor-relabeling
spec:
  evaluation:
    mutateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: ['konfigure.giantswarm.io']
        apiVersions: ['v1alpha1']
        operations: ['CREATE', 'UPDATE']
        resources: ['konfigurations']
  targetMatchConstraints:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: giantswarm
    objectSelector:
      matchLabels:
        app.kubernetes.io/instance: konfigure-operator
    resourceRules:
      - apiGroups: ['monitoring.coreos.com']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['podmonitors']
  variables:
    - name: konfigs
      expression: 'dyn(resource.List("konfigure.giantswarm.io/v1alpha1", "konfigurations", "").items)'
    - name: desired
      expression: >-
        variables.konfigs.map(kf,
          dyn(
            (has(kf.spec) && has(kf.spec.targets) && has(kf.spec.targets.iterations))
              ? kf.spec.targets.iterations : {}
          ).filter(k,
              has(dyn(kf.spec.targets.iterations)[k].variables) &&
              dyn(kf.spec.targets.iterations)[k].variables.exists(v, v.name == 'team'))
            .map(k, {
              "sourceLabels": dyn(["__name__", "resource_namespace", "resource_name", "iteration_name"]),
              "separator": dyn(";"),
              "regex": dyn("konfigure_operator_rendering;" +
                       kf.metadata.namespace + ";" +
                       kf.metadata.name + ";" + k),
              "targetLabel": dyn("team"),
              "replacement": dyn(dyn(kf.spec.targets.iterations)[k].variables.filter(v, v.name == 'team')[0].value),
              "action": dyn("replace")
            })
        ).map(inner, dyn(inner)).flatten()
    - name: existing
      expression: >-
        has(object.spec.podMetricsEndpoints[0].metricRelabelings)
          ? object.spec.podMetricsEndpoints[0].metricRelabelings
          : []
    - name: rebuilt
      expression: >-
        variables.existing.filter(r,
          !(has(r.targetLabel) && r.targetLabel == "team" &&
            has(r.regex) && r.regex.startsWith("konfigure_operator_rendering;")))
        + variables.desired
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          variables.rebuilt == variables.existing
          ? []
          : [
              JSONPatch{
                op: "add",
                path: "/spec/podMetricsEndpoints/0/metricRelabelings",
                value: variables.rebuilt
              }
            ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:konfigure-podmonitor-mutate
  labels:
    rbac.kyverno.io/aggregate-to-background-controller: "true"
    rbac.kyverno.io/aggregate-to-reports-controller: "true"
rules:
  - apiGroups: ["konfigure.giantswarm.io"]
    resources: ["konfigurations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors"]
    verbs: ["get", "list", "watch", "update", "patch"]

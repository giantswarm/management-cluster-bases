---
apiVersion: konfigure.giantswarm.io/v1alpha1
kind: Konfiguration
metadata:
  name: kamaji-addons-collection-konfiguration
  namespace: giantswarm
spec:
  targets:
    schema:
      reference:
        name: management-cluster-configuration
        namespace: giantswarm
    defaults:
      variables:
        - name: installation
          value: "${cluster_name}"
    iterations:
      cluster-api-control-plane-provider-kamaji:
        variables:
          - name: app
            value: cluster-api-control-plane-provider-kamaji
          - name: team
            value: rocket
      kamaji:
        variables:
          - name: app
            value: kamaji
          - name: team
            value: rocket
      local-path-provisioner:
        variables:
          - name: app
            value: local-path-provisioner
          - name: team
            value: rocket
  destination:
    namespace: giantswarm
    naming:
      suffix: konfiguration
      useSeparator: true
  reconciliation:
    interval: 1m
    retryInterval: 30s
    suspend: false
  sources:
    flux:
      gitRepository:
        name: "giantswarm-config"
        namespace: "flux-giantswarm"

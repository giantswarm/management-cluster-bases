apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: hello-world
  namespace: org-sample
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "3.0.2"
  url: oci://gsoci.azurecr.io/charts/giantswarm/hello-world
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-customer-hello-world
  namespace: org-sample
spec:
  releaseName: hello-world
  targetNamespace: hello-world
  storageNamespace: hello-world
  kubeConfig:
    secretRef:
      name: sample-customer-kubeconfig
  chartRef:
    kind: OCIRepository
    name: hello-world
    namespace: org-sample
  interval: 30m
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    ingress:
      annotations: {}
      hosts:
      - host: ingress.sample-customer.gaws.gigantic.io
        paths:
        - path: /
          pathType: ImplementationSpecific
      tls: []
    autoscaling:
      enabled: false

apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: prometheus-operator-crd
  namespace: org-sample
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "21.0.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/prometheus-operator-crd
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-customer-prometheus-operator-crd
  namespace: org-sample
spec:
  releaseName: prometheus-operator-crd
  targetNamespace: kube-system
  storageNamespace: kube-system
  kubeConfig:
    secretRef:
      name: sample-customer-kubeconfig
  chartRef:
    kind: OCIRepository
    name: prometheus-operator-crd
    namespace: org-sample
  interval: 50m
  install:
    remediation:
      retries: 3

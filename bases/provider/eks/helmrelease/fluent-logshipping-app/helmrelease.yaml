apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: fluent-logshipping-app
  namespace: org-sample
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "5.6.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/fluent-logshipping-app
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-customer-fluent-logshipping-app
  namespace: org-sample
spec:
  releaseName: fluent-logshipping-app
  targetNamespace: kube-system
  storageNamespace: kube-system
  kubeConfig:
    secretRef:
      name: sample-customer-kubeconfig
  chartRef:
    kind: OCIRepository
    name: fluent-logshipping-app
    namespace: org-sample
  interval: 50m
  install:
    remediation:
      retries: 3

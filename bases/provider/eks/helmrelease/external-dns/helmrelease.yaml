apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-dns-app
  namespace: org-sample
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "3.5.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/external-dns-app
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-customer-external-dns
  namespace: org-sample
spec:
  releaseName: external-dns
  targetNamespace: kube-system
  storageNamespace: kube-system
  kubeConfig:
    secretRef:
      name: sample-customer-kubeconfig
  chartRef:
    kind: OCIRepository
    name: external-dns-app
    namespace: org-sample
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    provider: aws
    aws:
      irsa: "true"
      batchChangeInterval: null
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::242036376510:role/sample-customer-Route53Manager-Role
    domainFilters:
      - sample-customer.gaws.gigantic.io
    txtOwnerId: giantswarm-io-external-dns
    txtPrefix: sample-customer
    annotationFilter: giantswarm.io/external-dns=managed
    priorityClassName: ""
    sources:
      - service
    extraArgs:
      - "--aws-batch-change-interval=10s"
    global:
      podSecurityStandards:
        enforced: true
    crd:
      install: false

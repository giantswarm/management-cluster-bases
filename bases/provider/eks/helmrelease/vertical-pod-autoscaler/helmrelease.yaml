apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: vertical-pod-autoscaler-app
  namespace: org-sample
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "6.1.2"
  url: oci://gsoci.azurecr.io/charts/giantswarm/vertical-pod-autoscaler-app
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-customer-vertical-pod-autoscaler
  namespace: org-sample
spec:
  releaseName: vertical-pod-autoscaler
  targetNamespace: kube-system
  storageNamespace: kube-system
  kubeConfig:
    secretRef:
      name: sample-customer-kubeconfig
  chartRef:
    kind: OCIRepository
    name: vertical-pod-autoscaler-app
    namespace: org-sample
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    ## Not sure about the location of the config
    ciliumNetworkPolicy:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: appcatalog-giantswarm-operations-platform
  namespace: flux-giantswarm
spec:
  chartRef:
    kind: OCIRepository
    name: appcatalog
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 20
      remediateLastFailure: False
  interval: 24h
  releaseName: appcatalog-giantswarm-operations-platform
  storageNamespace: giantswarm
  targetNamespace: giantswarm
  timeout: 3m
  upgrade:
    remediation:
      retries: 20
      remediateLastFailure: False
  values:
    appCatalog:
      name: "giantswarm-operations-platform"
      title: "Giant Swarm Operations Platform"
      catalogType: "stable"
      catalogVisibility: "internal"
      description: "This catalog holds stable versions of the apps in Giant Swarm Operations Platform. Giant Swarm developers only."
      logoURL: "/images/repo_icons/managed.png"
      storage:
        URL: "https://giantswarm.github.io/giantswarm-operations-platform-catalog/"
      repositories:
        - type: oci
          URL: "oci://gsoci.azurecr.io/charts/giantswarm/"
      config:
        configMap:
          values:
            image:
              registry: "gsoci.azurecr.io"

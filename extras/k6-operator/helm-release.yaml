apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k6-operator
  namespace: flux-giantswarm
spec:
  releaseName: k6-operator
  chartRef:
    kind: OCIRepository
    name: k6-operator
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 10
      remediateLastFailure: false
  interval: 10m
  targetNamespace: k6-operator
  timeout: 10m
  upgrade:
    remediation:
      retries: 10
      remediateLastFailure: false
  valuesFrom:
    - kind: ConfigMap
      name: k6-operator-user-values
      valuesKey: values

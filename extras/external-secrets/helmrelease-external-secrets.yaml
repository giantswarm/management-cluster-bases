apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-secrets
  namespace: flux-giantswarm
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "2.5.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/external-secrets
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-giantswarm
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 10
      remediateLastFailure: False
  interval: 1m
  targetNamespace: external-secrets
  timeout: 10m
  upgrade:
    remediation:
      retries: 10
      remediateLastFailure: False
  values:
    giantswarm:
      policyExceptionNamespace: "giantswarm"
      crds:
        install: true
        resources:
          requests:
            memory: "1000Mi"
            cpu: "250m"
          limits:
            memory: "1500Mi"
            cpu: "500m"

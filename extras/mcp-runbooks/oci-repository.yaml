apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mcp-runbooks
  namespace: flux-giantswarm
  labels:
    # Owning team for Flux-failure alert routing and Backstage catalog ownership.
    application.giantswarm.io/team: bumblebee
spec:
  interval: 10m
  url: oci://gsociprivate.azurecr.io/charts/giantswarm/mcp-runbooks
  ref:
    # Auto-update: deploy latest version automatically
    semver: ">=0.0.0"
  provider: generic
  secretRef:
    name: mcp-runbooks-flux-pull-secret

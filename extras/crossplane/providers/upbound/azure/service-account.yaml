---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: replaced by kustomization
  namespace: crossplane
  annotations: {}
  labels:
    provider-family: azure
    provider-family-member: azure-provider

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: upbound-provider-family-azure
  namespace: crossplane
  annotations: {}
  labels:
    provider-family: azure
    provider-family-member: azure-family

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: replaced by kustomization
  labels:
    psp-binding: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-use-psp
subjects:
  - kind: ServiceAccount
    name: replaced by kustomization
    namespace: crossplane
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: upbound-contrib-provider-kubernetes
  namespace: crossplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: upbound-contrib-provider-kubernetes
rules:
  - apiGroups: [""] # core/v1
    resources: [configmaps]
    verbs: [create, get, list, watch, patch, update, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: upbound-contrib-provider-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: upbound-contrib-provider-kubernetes
subjects:
  - kind: ServiceAccount
    name: upbound-contrib-provider-kubernetes
    namespace: crossplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-extra-view
rules:
  - apiGroups: [infrastructure.cluster.x-k8s.io]
    resources: [azureclusters]
    verbs: [get, list, watch]
  - apiGroups: [containerservice.azure.com]
    resources: [managedclusters]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-extra-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-extra-view
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane

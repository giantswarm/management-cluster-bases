apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: muster
  namespace: flux-giantswarm
spec:
  # Explicitly set release name to avoid Flux generating a prefixed name
  # when targetNamespace differs from HelmRelease namespace
  releaseName: muster
  # PILOT (feat/muster-tb-pilot): pinned to per-PR chart from
  # giantswarm-test-catalog. Revert to chartRef:OCIRepository before merge.
  chart:
    spec:
      chart: muster
      version: 0.0.0-tb-integration+51e7bd5
      sourceRef:
        kind: HelmRepository
        name: muster
        namespace: flux-giantswarm
  install:
    remediation:
      retries: 10
      remediateLastFailure: false
  interval: 10m
  targetNamespace: muster
  timeout: 10m
  upgrade:
    remediation:
      retries: 10
      remediateLastFailure: false
  valuesFrom:
    # ConfigMap rendered by Konfiguration from shared-configs template
    - kind: ConfigMap
      name: muster-konfiguration
      valuesKey: configmap-values.yaml


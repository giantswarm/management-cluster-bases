apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: muster
  namespace: flux-giantswarm
spec:
  # Explicitly set release name to avoid Flux generating a prefixed name
  # when targetNamespace differs from HelmRelease namespace
  releaseName: muster
  chartRef:
    kind: OCIRepository
    name: muster
    namespace: flux-giantswarm
  install:
    # App-owned CRDs: the muster app chart ships its MCPServer / Workflow CRDs in
    # its own crds/ dir. CreateReplace makes Flux apply and upgrade them atomically
    # with the app on every release (Helm never upgrades crds/-dir CRDs on its own),
    # so the CRDs always match the running muster version on this standalone path.
    crds: CreateReplace
    remediation:
      retries: 10
      remediateLastFailure: false
  interval: 10m
  targetNamespace: muster
  timeout: 10m
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 10
      remediateLastFailure: false
  valuesFrom:
    # ConfigMap rendered by Konfiguration from shared-configs template
    - kind: ConfigMap
      name: muster-konfiguration
      valuesKey: configmap-values.yaml


# PILOT (feat/muster-tb-pilot): swapped from OCIRepository to HelmRepository so
# we can pin per-PR chart versions from giantswarm-test-catalog. Per-PR muster
# CI builds explicitly skip OCI publishing (`.circleci/config.yml:65
# push_to_oci_registry: false`); revert this file to OCIRepository before
# merging anywhere near main.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: muster
  namespace: flux-giantswarm
spec:
  interval: 5m
  url: https://giantswarm.github.io/giantswarm-test-catalog/

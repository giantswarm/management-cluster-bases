apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: zot
  namespace: flux-giantswarm
spec:
  interval: 5m
  provider: generic
  ref:
    tag: "2.8.0"
  url: oci://gsoci.azurecr.io/charts/giantswarm/zot
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: flux-giantswarm
spec:
  chartRef:
    kind: OCIRepository
    name: zot
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 10
      remediateLastFailure: false
  interval: 1m
  targetNamespace: zot
  timeout: 10m
  upgrade:
    remediation:
      retries: 10
      remediateLastFailure: false
  valuesFrom:
    - kind: ConfigMap
      name: zot-cache-values
      valuesKey: values.yaml

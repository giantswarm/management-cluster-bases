apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentic-platform
  namespace: flux-giantswarm
spec:
  # Explicitly set release name to avoid Flux generating a prefixed name
  # when targetNamespace differs from HelmRelease namespace
  releaseName: agentic-platform
  # Cross-resource ordering: the platform chart applies CRs (Gateway,
  # AgentgatewayParameters, MCPServer, ...) whose CRDs are now shipped by the
  # sibling agentic-platform-crds release. Block reconciliation until that
  # HelmRelease is Ready.
  dependsOn:
    - name: agentic-platform-crds
      namespace: flux-giantswarm
  chartRef:
    kind: OCIRepository
    name: agentic-platform
    namespace: flux-giantswarm
  install:
    remediation:
      retries: 10
      remediateLastFailure: false
  interval: 10m
  targetNamespace: agentic-platform
  timeout: 10m
  upgrade:
    remediation:
      retries: 10
      remediateLastFailure: false
  valuesFrom:
    # ConfigMap rendered by Konfiguration from shared-configs template.
    # NOTE: requires a matching `agentic-platform` template in giantswarm-config
    # that renders values under the umbrella's `muster:` subchart prefix
    # (e.g. muster.muster.oauth.server.baseUrl, not oauth.server.baseUrl).
    - kind: ConfigMap
      name: agentic-platform-konfiguration
      valuesKey: configmap-values.yaml
    # Secret rendered by Konfiguration from the shared-configs secret-values template.
    # Per-cluster overrides (e.g. kagent.providers.anthropic.apiKey) are
    # SOPS-encrypted in giantswarm-configs under installations/<cluster>/apps/agentic-platform/.
    # optional: true so clusters without a secret override still reconcile.
    - kind: Secret
      name: agentic-platform-konfiguration
      valuesKey: secret-values.yaml
      optional: true
